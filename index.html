<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обнуление</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>⚡ Обнуление</h1>
    <p class="subtitle">Гонка за обнулением стока</p>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span id="progress-percent">0%</span>
      <span id="progress-left">Осталось: — шт.</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <h2><span class="section-icon">📊</span>Рейтинг бизнес-групп</h2>
  <div class="cards" id="bg-cards"></div>

  <h2><span class="section-icon">🧑‍💼</span>Рейтинг менеджеров</h2>
  <div class="cards" id="km-cards"></div>

  <h2><span class="section-icon">🎖️</span>Ачивки</h2>
  <div class="achievements-list" id="achievements"></div>

  <div class="footer">Обновлено: <span id="last-update"></span></div>
</div>
<script src="script.js"></script>
</body>
</html>
